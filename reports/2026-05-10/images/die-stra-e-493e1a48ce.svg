<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640"><rect width="900" height="640" fill="#f5efe9"/><rect x="32" y="32" width="836" height="576" rx="24" fill="#fff" opacity=".78"/><text x="56" y="110" font-size="44" fill="#263b4c" font-weight="700">Die Straße</text><text x="56" y="170" font-size="24" fill="#6d4a2f">Robert Seethaler · 文学 / 社会观察</text><text x="56" y="250" font-size="24" fill="#263b4c">以一条街的群像书写城市空间、关系、失落与短暂幸福。</text><text x="56" y="302" font-size="24" fill="#263b4c">适合偏好克制文风与城市日常切片的读者。</text><text x="56" y="540" font-size="20" fill="#6d4a2f">推荐信号：SPIEGEL 文学榜 #1</text></svg>