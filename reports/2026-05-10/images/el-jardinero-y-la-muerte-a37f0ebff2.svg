  <text x="50" y="132" font-size="42" fill="#273441">El jardinero y la</text>
  <text x="50" y="182" font-size="42" fill="#273441">muerte（暂译：园丁与死亡）</text>
  <text x="52" y="292" font-size="22" fill="#6c4f8f" font-weight="700">内容速览</text>
  <text x="52" y="332" font-size="25" fill="#273441">以父亲病重直至离世的漫长时段为叙事核心，作者在记忆与现场照护之间往返，书写沉默、爱与告别。</text>
  <text x="52" y="506" font-size="19" fill="#6c4f8f" font-weight="700">推荐理由</text>
  <text x="52" y="536" font-size="18" fill="#273441">西语畅销榜单作品，触及家庭叙事、哀悼书写与普遍心理议题。</text>
